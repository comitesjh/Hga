<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flayky OS - Advanced AI</title>
    <style>
        :root {
            --bg: #050505;
            --container: #0d0d0d;
            --accent: #00ff41; /* Verde Matrix/Terminal */
            --user-msg: #1a1a1a;
            --bot-text: #e0e0e0;
        }

        body { 
            font-family: 'Consolas', 'Courier New', monospace; 
            background: var(--bg); 
            color: var(--bot-text); 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            padding: 10px;
        }

        #chat-container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--container); 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            height: 90vh; 
            border: 1px solid #222; 
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); 
        }

        #header {
            padding: 15px;
            border-bottom: 1px solid #222;
            text-align: center;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #messages { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .msg { 
            padding: 12px 18px; 
            border-radius: 4px; 
            max-width: 85%; 
            line-height: 1.5; 
            font-size: 14px;
            position: relative;
        }

        .user { 
            background: var(--user-msg); 
            align-self: flex-end; 
            color: #fff; 
            border-right: 3px solid var(--accent);
        }

        .bot { 
            background: transparent; 
            align-self: flex-start; 
            color: var(--bot-text); 
            border-left: 2px solid #333;
        }

        /* Efeito de Cursor Piscando */
        .typing::after {
            content: '|';
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        #input-area { 
            display: flex; 
            padding: 20px; 
            background: #0a0a0a; 
            border-top: 1px solid #222; 
        }

        input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 1px solid #333; 
            border-radius: 4px; 
            background: #000; 
            color: var(--accent); 
            outline: none;
        }

        button { 
            padding: 0 20px; 
            margin-left: 10px; 
            cursor: pointer; 
            background: transparent; 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            border-radius: 4px; 
            transition: 0.3s;
        }

        button:hover { 
            background: var(--accent); 
            color: #000; 
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Flayky Hybrid v2.0</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Inicie o protocolo de conversa...">
        <button onclick="sendMessage()">EXECUTAR</button>
    </div>
</div>

<script>
    const chatDisplay = document.getElementById('messages');
    const userInput = document.getElementById('userInput');

    const bancoDados = [
        { keys: ['oi', 'olá', 'salve'], resp: "Saudações, usuário. Protocolo Flayky iniciado. Como posso processar suas solicitações hoje? :3" },
        { keys: ['quem é você', 'voce'], resp: "Eu sou a Flayky, uma inteligência híbrida fundindo algoritmos de processamento de linguagem com carisma digital. Sou sua assistente definitiva." },
        { keys: ['projeto', 'godot', 'jogo'], resp: "Detectado interesse em desenvolvimento. Meus núcleos sugerem focar na otimização do script de movimentação 3D. Quer ajuda com código?" },
        { keys: ['transformers', 'multiverso'], resp: "Acesso aos arquivos Cybertronianos concedido. Optimus Prime aprovaria seu progresso no projeto Multiverse-Formers." },
        { keys: ['fnaf', 'horror', 'terror'], resp: "Ativando modo 'Survival Horror'. Lembre-se: as luzes consomem bateria. Deseja que eu gere um roteiro assustador?" }
    ];

    window.onload = () => {
        const saved = localStorage.getItem('flayky_v2_history');
        if (saved) {
            chatDisplay.innerHTML = saved;
        } else {
            typeMessage("bot", "Sistema carregado. Flayky Híbrida online e pronta para operar.");
        }
    };

    function typeMessage(sender, text) {
        const div = document.createElement('div');
        div.classList.add('msg', sender, 'typing');
        chatDisplay.appendChild(div);
        
        let i = 0;
        function typing() {
            if (i < text.length) {
                div.innerText += text.charAt(i);
                i++;
                chatDisplay.scrollTop = chatDisplay.scrollHeight;
                setTimeout(typing, 20); // Velocidade da digitação
            } else {
                div.classList.remove('typing');
                localStorage.setItem('flayky_v2_history', chatDisplay.innerHTML);
            }
        }
        typing();
    }

    function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Adiciona mensagem do usuário
        const userDiv = document.createElement('div');
        userDiv.classList.add('msg', 'user');
        userDiv.innerText = text;
        chatDisplay.appendChild(userDiv);
        
        userInput.value = '';

        if (text.toLowerCase().includes('limpar')) {
            localStorage.removeItem('flayky_v2_history');
            setTimeout(() => { 
                chatDisplay.innerHTML = ''; 
                typeMessage('bot', 'Memória limpa. Sistema reiniciado.');
            }, 500);
            return;
        }

        // Resposta da IA
        setTimeout(() => {
            let respostaFinal = "Interessante... Meus bancos de dados ainda não possuem uma resposta exata, mas como uma IA híbrida, estou aprendendo com essa interação.";
            
            for (let item of bancoDados) {
                if (item.keys.some(k => text.toLowerCase().includes(k))) {
                    respostaFinal = item.resp;
                    break;
                }
            }
            typeMessage('bot', respostaFinal);
        }, 800);
    }

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
