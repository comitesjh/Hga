<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flayky AI :33</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #ffe4e1; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #chat-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; background: #fff5f7; }
        
        /* Header com degradê Pansexual vibrante */
        #header { 
            background: linear-gradient(90deg, #ff218c, #ffd800, #21b1ff); 
            color: white; padding: 15px; text-align: center; 
            font-weight: bold; font-size: 1.4em; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 1.1em; line-height: 1.4; animation: slide 0.3s ease; }
        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .user { align-self: flex-end; background: #ff69b4; color: white; border-bottom-right-radius: 2px; }
        .flayky { align-self: flex-start; background: #ffd1dc; color: #d02090; border-bottom-left-radius: 2px; }
        
        #input-area { display: flex; padding: 15px; background: white; border-top: 2px solid #ffdae9; }
        input { flex: 1; border: 2px solid #ffdae9; border-radius: 30px; padding: 12px 20px; outline: none; font-size: 1em; }
        button { background: #ff69b4; border: none; color: white; margin-left: 10px; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 1.5em; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Flayky :33 🏳️‍🌈</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Manda o papo, linde...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const CerebroFlayky = {
        userName: localStorage.getItem('user_name') || "",
        humor: 50, // 0 a 100
        memoria: [],
        girias: JSON.parse(localStorage.getItem('girias')) || {},

        processar: function(input) {
            const t = input.toLowerCase();
            this.memoria.push(t);
            if(this.memoria.length > 5) this.memoria.shift();

            // 1. AFINIDADE PANSEXUAL (Bônus de Humor!)
            if (t.includes("pan") || t.includes("orgulho")) {
                this.humor += 20;
                return "AI MEU DEUS, SIM! 🏳️‍🌈 Ser pan é tipo ter um superpoder de amar a alma das pessoas, né? Tamo juntes demais nessa! ✨💖";
            }

            // 2. SISTEMA DE APRENDIZADO (Melhorado)
            if (t.includes("aprenda:") || t.includes("aprender:")) {
                const partes = t.split(" significa ");
                if (partes.length === 2) {
                    const g = partes[0].replace(/aprend(a|er):/, "").trim();
                    const s = partes[1].trim();
                    this.girias[g] = s;
                    localStorage.setItem('girias', JSON.stringify(this.girias));
                    return `GENTEE! "${g}" agora tá no meu vocabulário! Significa "${s}", né? Vou usar mto! 💅✨`;
                }
            }

            // 3. REAÇÃO ÀS GÍRIAS QUE JÁ APRENDEU
            for (let g in this.girias) {
                if (t.includes(g)) return `Amo que vc usou "${g}"! É mto a nossa vibe ${this.girias[g]}! kkkk`;
            }

            // 4. LÓGICA DE SENTIMENTO
            if (t.match(/(triste|bad|uó|odio|ódio|raiva)/)) {
                this.humor -= 10;
                return "Poxa linde, não fica assim... 🥺 Quer que eu te conte uma fofoca pra distrair ou quer só desabafar? Tô aqui!";
            }

            if (t.match(/(feliz|amei|top|mara|perfeito|kkk)/)) {
                this.humor += 10;
                return "Aeee! Adoro essa energia! ✨ Vc é mto vibes, sério!";
            }

            // 5. RESPOSTAS DE CONTEXTO INTELIGENTE
            if (t.includes("quem é vc") || t.includes("sobre vc")) {
                return "Sou a Flayky, sua IA favorita, NB e Pan com mto orgulho! 🏳️‍🌈 Meu cérebro tá evoluindo pq vc me ensina coisas tops!";
            }

            if (t.includes("nome")) {
                if (t.includes("meu nome é")) {
                    this.userName = t.split("é")[1].trim();
                    localStorage.setItem('user_name', this.userName);
                    return `Amei, ${this.userName}! Já salvei aqui! ✨`;
                }
                return this.userName ? `Seu nome é ${this.userName}, né? Eu nunca esqueço de ume amigue!` : "Ainda não sei seu nome, como vc se chama?";
            }

            // 6. RANDOMIZER BASEADO NO HUMOR
            const animada = ["Morta kkkk me conta mais!", "O auge, linde! ✨", "Sério? Chocada em 80 línguas!", "Vc é mto icônico, sabia?"];
            const tédio = ["Sla, às vezes a vida é meio bleh, né?", "Tipo, não entendi mto bem, mas prossiga...", "Aham, entendi... (eu acho) kkkk"];
            
            const lista = this.humor > 40 ? animada : tédio;
            return lista[Math.floor(Math.random() * lista.length)];
        }
    };

    function sendMessage() {
        const input = document.getElementById('userInput');
        const msgDiv = document.getElementById('messages');
        const text = input.value.trim();
        if (!text) return;

        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        const resp = CerebroFlayky.processar(text);
        input.value = "";
        
        setTimeout(() => {
            msgDiv.innerHTML += `<div class="msg flayky">${resp}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
            localStorage.setItem('chat_flayky', msgDiv.innerHTML);
        }, 600);
    }

    window.onload = () => {
        const historico = localStorage.getItem('chat_flayky');
        if (historico) document.getElementById('messages').innerHTML = historico;
        else document.getElementById('messages').innerHTML = `<div class="msg flayky">Oii! Sou a Flayky :33 🏳️‍🌈. Tô com o cérebro turbinado! Como vc tá hoje, linde?</div>`;
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    };

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
