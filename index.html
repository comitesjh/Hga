<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone Pro - 2026</title>
    <style>
        :root {
            --yt-red: #ff0000;
            --yt-black: #0f0f0f;
            --yt-gray: #272727;
            --yt-white: #ffffff;
            --yt-text-gray: #aaaaaa;
        }

        body {
            background-color: var(--yt-black);
            color: var(--yt-white);
            font-family: "Roboto", Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            background-color: var(--yt-black);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-bar {
            display: flex;
            flex: 0 1 600px;
        }

        input {
            width: 100%;
            background-color: #121212;
            border: 1px solid var(--yt-gray);
            color: white;
            padding: 10px;
            border-radius: 20px 0 0 20px;
            outline: none;
        }

        button#search-btn {
            background-color: var(--yt-gray);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
        }

        /* Layout Principal */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Player Section */
        #player-container {
            flex: 3;
            padding: 20px;
            overflow-y: auto;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Sidebar / Lista de Vídeos */
        #sidebar {
            flex: 1;
            padding: 20px;
            border-left: 1px solid var(--yt-gray);
            overflow-y: auto;
        }

        .video-item {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .video-item:hover { background: var(--yt-gray); }

        .thumbnail {
            width: 120px;
            height: 68px;
            background-size: cover;
            border-radius: 8px;
        }

        .video-info h4 {
            margin: 0;
            font-size: 14px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-info p {
            font-size: 12px;
            color: var(--yt-text-gray);
            margin: 5px 0;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 20px; color: var(--yt-red);">YouTube<span style="color:white">Clone</span></div>
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Pesquisar vídeos...">
        <button id="search-btn">🔍</button>
    </div>
    <div id="user-status">● Online</div>
</header>

<main>
    <section id="player-container">
        <div class="video-wrapper" id="main-player">
            <div style="padding: 20%; text-align: center;">Pesquise algo para começar!</div>
        </div>
        <h2 id="current-title">Selecione um vídeo</h2>
        <p id="current-desc" style="color: var(--yt-text-gray);"></p>
    </section>

    <aside id="sidebar">
        <h3>Recomendados</h3>
        <div id="results-list"></div>
    </aside>
</main>

<script>
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const resultsList = document.getElementById('results-list');
    const mainPlayer = document.getElementById('main-player');

    // Chave de API pública (Exemplo - Em produção use a sua própria)
    // Nota: Como IA, não posso fornecer uma chave privada eterna, 
    // mas esta lógica usa a busca do próprio sistema.
    
    async function searchVideos(query) {
        if(!query) return;
        
        // Salvando o estado da busca (Como você pediu para voltar onde saiu)
        localStorage.setItem('lastSearch', query);

        // Simulando busca via IFrame (Embed) para evitar limites de API Key
        // Em um app real, aqui chamariamos a YouTube Data API v3
        const mockVideos = [
            {id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up', channel: 'Rick Astley'},
            {id: '9bZkp7q19f0', title: 'PSY - GANGNAM STYLE', channel: 'officialpsy'},
            {id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito', channel: 'LuisFonsiVEVO'},
            {id: 'L_jWHffIx5E', title: 'Smash Mouth - All Star', channel: 'SmashMouthVEVO'}
        ];

        renderList(mockVideos);
    }

    function renderList(videos) {
        resultsList.innerHTML = '';
        videos.forEach(video => {
            const div = document.createElement('div');
            div.className = 'video-item';
            div.innerHTML = `
                <div class="thumbnail" style="background-image: url('https://img.youtube.com/vi/${video.id}/mqdefault.jpg')"></div>
                <div class="video-info">
                    <h4>${video.title}</h4>
                    <p>${video.channel}</p>
                </div>
            `;
            div.onclick = () => playVideo(video.id, video.title);
            resultsList.appendChild(div);
        });
    }

    function playVideo(id, title) {
        mainPlayer.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
        document.getElementById('current-title').innerText = title;
        
        // Salva o último vídeo assistido
        localStorage.setItem('lastVideoId', id);
        localStorage.setItem('lastVideoTitle', title);
    }

    // Lógica para VOLTAR ONDE PAROU
    window.onload = () => {
        const lastSearch = localStorage.getItem('lastSearch');
        const lastVideoId = localStorage.getItem('lastVideoId');
        const lastVideoTitle = localStorage.getItem('lastVideoTitle');

        if(lastSearch) {
            searchInput.value = lastSearch;
            searchVideos(lastSearch);
        }

        if(lastVideoId) {
            playVideo(lastVideoId, lastVideoTitle);
        }
    };

    searchBtn.onclick = () => searchVideos(searchInput.value);
    searchInput.onkeypress = (e) => { if(e.key === 'Enter') searchVideos(searchInput.value); };

</script>
</body>
</html>
