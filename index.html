<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Editor Pro</title>
  <style>
    :root {
      --primary: #ff0055;
      --secondary: #00f2ff;
      --bg: #0a0a0c;
      --card: rgba(255, 255, 255, 0.05);
    }

    body { 
      font-family: 'Segoe UI', Roboto, sans-serif; 
      background: var(--bg); 
      color: white; 
      margin: 0; 
      padding: 0; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header e Video Sticky */
    .header {
      width: 100%;
      padding: 15px;
      text-align: center;
      background: linear-gradient(to bottom, #111, transparent);
    }

    .canvas-area { 
      position: sticky; 
      top: 0; 
      background: var(--bg); 
      padding: 10px; 
      z-index: 100; 
      width: 100%;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    video { 
      width: 100%; 
      max-width: 600px;
      border-radius: 15px; 
      border: 2px solid var(--primary);
      box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
      display: block;
      margin: 0 auto;
    }

    /* Área de Conteúdo */
    .scroll-area { 
      padding: 20px; 
      width: 100%;
      max-width: 600px;
      box-sizing: border-box;
    }

    h3 { 
      font-size: 14px; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      color: var(--secondary);
      margin-top: 25px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 15px;
    }

    /* Controles */
    .controls { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 12px; 
    }

    button { 
      padding: 14px; 
      border: none; 
      border-radius: 12px; 
      font-weight: bold; 
      font-size: 13px; 
      cursor: pointer; 
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:active { transform: scale(0.95); }

    .btn-file { background: #222; color: white; border: 1px solid #444; }
    .btn-rec { background: var(--primary); color: white; grid-column: span 2; }

    /* Sliders Estilizados */
    .slider-group { margin-bottom: 15px; }
    .slider-group label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
    
    input[type="range"] { 
      width: 100%; 
      height: 6px;
      background: #333;
      border-radius: 5px;
      outline: none;
      -webkit-appearance: none;
      accent-color: var(--primary);
    }

    /* Trilhas */
    .track { 
      background: rgba(255,255,255,0.08); 
      padding: 12px; 
      margin-top: 8px; 
      border-radius: 10px; 
      font-size: 12px; 
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .track span { color: var(--secondary); font-weight: bold; }

  </style>
</head>
<body>

<div class="header">
  <h2 style="margin:0; font-size: 1.2rem;">✨ Flash Editor Pro</h2>
</div>

<div class="canvas-area">
  <video id="video" controls></video>
</div>

<div class="scroll-area">
  <div class="card">
    <div class="controls">
      <button class="btn-file" onclick="document.getElementById('vIn').click()">🎥 Vídeo</button>
      <button class="btn-file" onclick="document.getElementById('aIn').click()">🎵 Áudio</button>
      <button class="btn-file" onclick="document.getElementById('v2aIn').click()">🔊 Extrair</button>
      <button id="recBtn" class="btn-rec" onclick="toggleRec()">🎤 Gravar Voz</button>
    </div>
  </div>

  <input type="file" id="vIn" accept="video/*" hidden onchange="loadVid(this)">
  <input type="file" id="aIn" accept="audio/*" hidden onchange="addAud(this)">
  <input type="file" id="v2aIn" accept="video/*" hidden onchange="addAud(this)">

  <h3>Filtros de Imagem</h3>
  <div class="card">
    <div class="slider-group">
      <label>Brilho</label>
      <input type="range" id="br" min="0" max="200" value="100" oninput="apply()">
    </div>
    <div class="slider-group">
      <label>Saturação</label>
      <input type="range" id="st" min="0" max="200" value="100" oninput="apply()">
    </div>
    <div class="slider-group">
      <label>Cinza</label>
      <input type="range" id="gr" min="0" max="100" value="0" oninput="apply()">
    </div>
    <div class="slider-group">
      <label>Velocidade</label>
      <input type="range" id="sp" min="0.5" max="2" step="0.1" value="1" oninput="apply()">
    </div>
  </div>

  <h3>Trilhas Sonoras</h3>
  <div id="tracks"></div>
</div>

<script>
  const video = document.getElementById('video');
  let mediaRec;
  let chunks = [];

  function apply() {
    const br = document.getElementById('br').value;
    const st = document.getElementById('st').value;
    const gr = document.getElementById('gr').value;
    const sp = document.getElementById('sp').value;
    
    video.style.filter = `brightness(${br}%) saturate(${st}%) grayscale(${gr}%)`;
    video.playbackRate = sp;
    saveState();
  }

  function loadVid(input) {
    if (input.files && input.files[0]) {
      video.src = URL.createObjectURL(input.files[0]);
      apply();
    }
  }

  function addAud(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const url = URL.createObjectURL(file);
    const id = 'aud' + Date.now();
    
    const div = document.createElement('div');
    div.className = 'track';
    div.innerHTML = `
      <span>🎵 ${file.name.substring(0,20)}</span>
      <audio id="${id}" src="${url}"></audio>
      <input type="range" min="0" max="1" step="0.1" value="1" oninput="document.getElementById('${id}').volume=this.value">
    `;
    document.getElementById('tracks').appendChild(div);
  }

  async function toggleRec() {
    const btn = document.getElementById('recBtn');
    if (!mediaRec || mediaRec.state === 'inactive') {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        chunks = [];
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = () => {
          const blob = new Blob(chunks, { type: 'audio/ogg' });
          addAud({ files: [new File([blob], "Gravacao_" + Date.now() + ".ogg")] });
        };
        mediaRec.start();
        btn.innerText = "🛑 Parar Gravação";
        btn.style.background = "#ffcc00";
        btn.style.color = "#000";
      } catch (err) {
        alert("Erro ao acessar microfone!");
      }
    } else {
      mediaRec.stop();
      btn.innerText = "🎤 Gravar Voz";
      btn.style.background = "var(--primary)";
      btn.style.color = "white";
    }
  }

  // Sincronização Perfeita
  video.onplay = () => document.querySelectorAll('audio').forEach(a => a.play());
  video.onpause = () => document.querySelectorAll('audio').forEach(a => a.pause());
  video.onseeking = () => document.querySelectorAll('audio').forEach(a => a.currentTime = video.currentTime);

  function saveState() {
    const state = {
        br: document.getElementById('br').value,
        st: document.getElementById('st').value,
        gr: document.getElementById('gr').value,
        sp: document.getElementById('sp').value,
        time: video.currentTime
    };
    localStorage.setItem('mobileEditorV2', JSON.stringify(state));
  }

  window.onload = () => {
    const s = JSON.parse(localStorage.getItem('mobileEditorV2'));
    if(s) {
        document.getElementById('br').value = s.br;
        document.getElementById('st').value = s.st;
        document.getElementById('gr').value = s.gr;
        document.getElementById('sp').value = s.sp;
        video.currentTime = s.time || 0;
        apply();
    }
  };
  
  // Salva o tempo do vídeo periodicamente
  video.ontimeupdate = () => {
    if (Math.floor(video.currentTime) % 2 === 0) saveState();
  };
</script>
</body>
</html>
