<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Editor Render</title>
  <style>
    :root { --p: #ff0055; --s: #00f2ff; --bg: #0a0a0c; }
    body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; }
    .canvas-area { position: sticky; top: 0; background: var(--bg); padding: 15px; z-index: 100; text-align: center; }
    
    /* O Canvas é onde a mágica acontece */
    canvas { 
      width: 100%; 
      max-width: 500px; 
      border-radius: 15px; 
      border: 2px solid var(--p);
      background: #000;
    }

    .scroll-area { padding: 20px; max-width: 600px; margin: auto; }
    .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    button { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #222; color: white; }
    .btn-export { background: linear-gradient(45deg, var(--p), #ff00ff); grid-column: span 2; margin-top: 10px; }
    
    input[type="range"] { width: 100%; accent-color: var(--p); }
    label { font-size: 12px; color: #aaa; display: block; margin-top: 10px; }
    video#vHidden { display: none; } /* Vídeo original escondido */
  </style>
</head>
<body>

<div class="canvas-area">
  <canvas id="ctx"></canvas>
  <video id="vHidden" crossorigin="anonymous"></video>
</div>

<div class="scroll-area">
  <div class="card">
    <div class="grid">
      <button onclick="document.getElementById('vIn').click()">🎥 Vídeo</button>
      <button onclick="document.getElementById('aIn').click()">🎵 Áudio</button>
      <button id="exportBtn" class="btn-export" onclick="exportVideo()">📥 Baixar Vídeo Editado</button>
    </div>
  </div>

  <input type="file" id="vIn" accept="video/*" hidden onchange="loadVid(this)">
  <input type="file" id="aIn" accept="audio/*" hidden onchange="addAud(this)">

  <h3>Edição em Tempo Real</h3>
  <div class="card">
    <label>Brilho</label>
    <input type="range" id="br" min="0" max="200" value="100">
    
    <label>Saturação</label>
    <input type="range" id="st" min="0" max="200" value="100">
    
    <label>Zoom & Rotação</label>
    <div class="grid">
        <button onclick="rot += 90">🔄 Girar</button>
        <button onclick="z = (z === 1 ? 1.5 : 1)">🔍 Zoom</button>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('ctx');
  const c = canvas.getContext('2d');
  const v = document.getElementById('vHidden');
  let rot = 0, z = 1;

  // Loop de desenho (Renderiza os filtros no Canvas)
  function draw() {
    canvas.width = v.videoWidth || 640;
    canvas.height = v.videoHeight || 360;
    
    c.save();
    // Aplica Filtros
    c.filter = `brightness(${document.getElementById('br').value}%) saturate(${document.getElementById('st').value}%)`;
    
    // Aplica Transformações
    c.translate(canvas.width/2, canvas.height/2);
    c.rotate(rot * Math.PI / 180);
    c.scale(z, z);
    c.drawImage(v, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
    
    c.restore();
    requestAnimationFrame(draw);
  }

  function loadVid(input) {
    v.src = URL.createObjectURL(input.files[0]);
    v.play();
    draw();
  }

  async function exportVideo() {
    const btn = document.getElementById('exportBtn');
    btn.innerText = "⏺️ Gravando... Aguarde o fim do vídeo";
    
    const stream = canvas.captureStream(30); // Captura 30 FPS do Canvas
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    const chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'meu-video-editado.webm';
      a.click();
      btn.innerText = "📥 Baixar Vídeo Editado";
    };

    v.currentTime = 0;
    v.play();
    recorder.start();

    v.onended = () => {
      recorder.stop();
      v.onended = null;
    };
  }

  // Persistência simples
  v.ontimeupdate = () => {
    localStorage.setItem('editorTime', v.currentTime);
  };

  window.onload = () => {
    const savedTime = localStorage.getItem('editorTime');
    if(savedTime) v.currentTime = savedTime;
  };
</script>
</body>
</html>
