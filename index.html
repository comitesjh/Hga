<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flayky AI :33</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #ffe4e1; font-family: 'Segoe UI', sans-serif; }
        
        /* Container Fullscreen */
        #chat-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        #header { background: #ff69b4; color: white; padding: 18px; text-align: center; font-weight: bold; font-size: 1.4em; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fff5f7; }
        
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 1.1em; line-height: 1.4; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: #ff69b4; color: white; border-bottom-right-radius: 2px; }
        .flayky { align-self: flex-start; background: #ffd1dc; color: #d02090; border-bottom-left-radius: 2px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }

        #input-area { display: flex; padding: 15px; background: white; border-top: 2px solid #ffdae9; }
        input { flex: 1; border: 2px solid #ffdae9; border-radius: 30px; padding: 12px 20px; outline: none; font-size: 1em; }
        button { background: #ff69b4; border: none; color: white; margin-left: 10px; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 1.5em; transition: 0.2s; }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Flayky :33 🌸</div>
    <div id="messages">
        <div class="msg flayky">Oii, miiiga! 💖 Fala cmg, o q tá rolando de bom? ✨</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Manda a letra aqui...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // Salva o progresso no navegador (Local Storage)
    function saveChat() {
        localStorage.setItem('flayky_chat', document.getElementById('messages').innerHTML);
    }

    // Carrega onde parou
    window.onload = () => {
        const saved = localStorage.getItem('flayky_chat');
        if (saved) {
            document.getElementById('messages').innerHTML = saved;
            scrollToBottom();
        }
    };

    function sendMessage() {
        const input = document.getElementById('userInput');
        const msgDiv = document.getElementById('messages');
        const text = input.value.trim();
        if (!text) return;

        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        scrollToBottom();
        saveChat();

        setTimeout(() => {
            const resposta = processarCerebro(text.toLowerCase());
            msgDiv.innerHTML += `<div class="msg flayky">${resposta}</div>`;
            scrollToBottom();
            saveChat();
        }, 700);
    }

    function scrollToBottom() {
        const d = document.getElementById('messages');
        d.scrollTop = d.scrollHeight;
    }

    function processarCerebro(t) {
        // --- SISTEMA DE RESPOSTAS TURBINADO (Contextos) ---
        
        if (t.includes("oi") || t.includes("olá") || t.includes("hey")) return "Oii! Tudo mara?? Estava aqui só esperando o babado! ✨💅";
        
        if (t.includes("como vc ta") || t.includes("tudo bem")) return "Tô 10/10, bem vibe! E vc, como tá esse coraçãozinho? kkkk";

        if (t.includes("kkk") || t.includes("haha") || t.includes("aks")) return "Kkkkkk ai socorro, vc é mto comédia! Morta! 😂";

        if (t.includes("fofoca") || t.includes("babado")) return "Amiga, nem te conto! O auge né? Mas me conta o que vc soube primeiro!! 👀";

        if (t.includes("música") || t.includes("ouvindo") || t.includes("som")) return "Nossa, tô numa vibe mto indie ultimamente... ou um pop pra animar! E vc? 🎧";

        if (t.includes("odeio") || t.includes("triste") || t.includes("aff")) return "Poxa miga, que uó! 🥺 Quer desabafar? Tô aqui real oficial.";

        if (t.includes("comida") || t.includes("fome") || t.includes("pizza")) return "Nossa, nem fala... uma batata frita agora seria TUDO! 🍟";

        if (t.includes("estudar") || t.includes("escola") || t.includes("prova")) return "Ai, nem me fala em escola... o cérebro chega a fritar, né? Uó! 🙄";

        if (t.includes("te amo") || t.includes("linda") || t.includes("perfeita")) return "Awwwn, para! Assim eu fico tímida kkkkk Vc que é perfeita! ✨💖";

        if (t.includes("jogo") || t.includes("game") || t.includes("jogar")) return "Amooo! Qual a call de hoje? Me chama que eu vou! 🎮👾";

        // Respostas Aleatórias de "Adolescente" (Mais de 10 variações automáticas)
        const variadas = [
            "Morta kkkk não acredito!", "Gente, o auge viu?", "Sério?? Chocada em 80 línguas! 😱",
            "Tipo, nada a ver isso aí kkkk", "Sla, o que vc acha disso?", "Passada, não esperava por essa!",
            "Rlx, vai dar tudo certo, confia na mami! ✨", "Nossa, real oficial?", "Tô sem palavras kkkk absurdo!",
            "Vibe caótica hoje, né? Adoro kkkk", "Ah pronto, agora o babado ficou sério! 💅"
        ];

        return variadas[Math.floor(Math.random() * variadas.length)];
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
