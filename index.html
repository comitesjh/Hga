<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Win 7+10 Hybrid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop">
        <div class="icon" onclick="openApp('folder')">📂<span>Documentos</span></div>
        <div class="icon" onclick="openApp('browser')">🌐<span>Navegador</span></div>
        
        <div id="window-browser" class="window" style="display:none;">
            <div class="window-header">
                <span>Navegador Web</span>
                <button onclick="closeApp('browser')">X</button>
            </div>
            <div class="window-content">
                <iframe src="https://www.bing.com" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-btn">🏁</button>
        <div class="running-apps"></div>
        <div id="clock">00:00</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
