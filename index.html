<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flayky AI - Advanced Neural Link</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #121214;
            --accent: #00f2ff; /* Azul Neon Cyperpunk */
            --text: #d1d1d1;
            --user-bg: #1e1e24;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; justify-content: center; height: 100vh; 
        }

        #chat-container { 
            width: 100%; max-width: 700px; background: var(--panel); 
            display: flex; flex-direction: column; height: 100vh;
            border-left: 1px solid #222; border-right: 1px solid #222;
        }

        #header { 
            padding: 15px; border-bottom: 1px solid #222; text-align: center; 
            color: var(--accent); font-size: 0.9rem; letter-spacing: 3px; font-weight: bold;
        }

        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        .msg { max-width: 85%; line-height: 1.6; font-size: 15px; padding: 10px 15px; border-radius: 12px; }
        
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 2px; }
        
        .bot { align-self: flex-start; background: transparent; border-left: 2px solid var(--accent); border-radius: 0; }

        code { background: #000; color: #ff79c6; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }

        #input-area { padding: 20px; background: #0f0f11; display: flex; gap: 10px; border-top: 1px solid #222; }
        
        input { 
            flex-grow: 1; background: #1a1a1d; border: 1px solid #333; 
            padding: 12px 15px; border-radius: 8px; color: #fff; outline: none; 
        }
        
        input:focus { border-color: var(--accent); }

        button { 
            background: var(--accent); color: #000; border: none; 
            padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; 
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">FLAYKY NEURAL INTERFACE v3.0</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Digite sua mensagem ou comando...">
        <button onclick="sendMessage()">ENVIAR</button>
    </div>
</div>

<script>
    const chatDisplay = document.getElementById('messages');
    const userInput = document.getElementById('userInput');

    // Banco de Conhecimento com Pesos de Intenção
    const brain = [
        { 
            intent: "saudacao", 
            keywords: ["oi", "ola", "salve", "bom dia", "tarde", "noite"], 
            responses: ["Conexão estabelecida. Olá! Como posso ajudar seu desenvolvimento hoje?", "Sistema online. Saudações, mestre! :3"] 
        },
        { 
            intent: "codigo", 
            keywords: ["script", "codigo", "programar", "html", "javascript", "godot"], 
            responses: ["Entendido. Ativando módulos de programação. Qual função você deseja otimizar?", "Analizando sintaxe... Estou pronta para gerar scripts para seu projeto."] 
        },
        { 
            intent: "pessoal", 
            keywords: ["quem e voce", "seu nome", "quem e tu"], 
            responses: ["Eu sou a Flayky, uma fusão entre lógica avançada e suporte criativo.", "Sou sua interface neural personalizada, treinada para te auxiliar em projetos de horror e Transformers!"] 
        }
    ];

    window.onload = () => {
        const saved = localStorage.getItem('flayky_v3');
        if (saved) {
            chatDisplay.innerHTML = saved;
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        } else {
            typeEffect("Flayky online. Aguardando input de dados para processamento...");
        }
    };

    function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMsg('user', text);
        userInput.value = '';

        setTimeout(() => {
            const response = processInput(text);
            typeEffect(response);
        }, 600);
    }

    function processInput(input) {
        const cleanInput = input.toLowerCase();
        
        // Lógica de "Limpeza"
        if (cleanInput.includes("limpar") || cleanInput.includes("resetar")) {
            localStorage.removeItem('flayky_v3');
            chatDisplay.innerHTML = '';
            return "Memória formatada com sucesso. Iniciando novo ciclo.";
        }

        // Busca por intenção
        for (let entry of brain) {
            if (entry.keywords.some(k => cleanInput.includes(k))) {
                return entry.responses[Math.floor(Math.random() * entry.responses.length)];
            }
        }

        return "Input recebido, mas sem correspondência exata nos meus núcleos. Pode elaborar mais? Estou analisando o contexto... >:3";
    }

    function appendMsg(sender, text) {
        const div = document.createElement('div');
        div.classList.add('msg', sender);
        div.innerText = text;
        chatDisplay.appendChild(div);
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
        localStorage.setItem('flayky_v3', chatDisplay.innerHTML);
    }

    function typeEffect(text) {
        const div = document.createElement('div');
        div.classList.add('msg', 'bot');
        chatDisplay.appendChild(div);
        
        let i = 0;
        const interval = setInterval(() => {
            div.innerText += text[i];
            i++;
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            if (i >= text.length) {
                clearInterval(interval);
                localStorage.setItem('flayky_v3', chatDisplay.innerHTML);
            }
        }, 25);
    }

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
