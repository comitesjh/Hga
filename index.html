<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Editor Ultra Pro</title>
  <style>
    :root { --p: #ff0055; --s: #00f2ff; --bg: #050505; --c: rgba(255,255,255,0.07); }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
    
    /* Sistema de Abas */
    .tabs { display: flex; position: sticky; top: 0; z-index: 1000; background: #000; padding: 10px; gap: 10px; border-bottom: 1px solid #222; }
    .tab { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #111; color: #666; font-weight: bold; }
    .tab.active { background: var(--p); color: white; box-shadow: 0 0 15px rgba(255,0,85,0.4); }

    .page { display: none; padding: 20px; box-sizing: border-box; }
    .page.active { display: block; }

    /* Tela de Preview */
    .preview-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; border-radius: 15px; overflow: hidden; border: 2px solid var(--s); line-height: 0; }
    video, canvas { width: 100%; display: block; transition: transform 0.3s; }
    #subtitle-overlay { position: absolute; bottom: 10%; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }

    /* Controles de Edição */
    .card { background: var(--c); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    
    button { padding: 10px; border-radius: 8px; border: none; background: #222; color: white; font-size: 12px; cursor: pointer; transition: 0.2s; }
    button:active { transform: scale(0.9); }
    .btn-save { background: #00c853; width: 100%; font-size: 16px; margin-top: 10px; padding: 15px; font-weight: bold; }
    
    input[type="range"] { width: 100%; accent-color: var(--p); }
    label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
  </style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="openPage('preview', this)">📺 Preview</button>
  <button class="tab" onclick="openPage('edit', this)">⚙️ Editar</button>
</div>

<div id="preview" class="page active">
  <div class="preview-container" id="box">
    <video id="video" crossorigin="anonymous"></video>
    <div id="subtitle-overlay"></div>
  </div>
  
  <div class="card" style="margin-top: 20px;">
    <div class="grid">
      <button onclick="video.play()">▶ Play</button>
      <button onclick="video.pause()">⏸ Pause</button>
    </div>
    <button class="btn-save" onclick="exportVideo()">⬇️ BAIXAR VÍDEO EDITADO</button>
    <p id="status" style="text-align:center; font-size: 12px; color: var(--s);"></p>
  </div>
</div>

<div id="edit" class="page">
  <div class="card">
    <button style="width:100%" onclick="document.getElementById('vIn').click()">🎥 Carregar Vídeo</button>
    <input type="file" id="vIn" hidden accept="video/*" onchange="loadVid(this)">
  </div>

  <h3>🔤 Legendas</h3>
  <div class="card">
    <input type="text" id="subIn" placeholder="Digite sua legenda aqui..." oninput="updateSub()">
    <div class="grid" style="margin-top:10px">
      <div><label>Cor</label><input type="color" id="subCol" value="#ffffff" oninput="updateSub()"></div>
      <div><label>Tamanho</label><input type="range" id="subSize" min="14" max="50" value="24" oninput="updateSub()"></div>
    </div>
  </div>

  <h3>🎨 20 Opções de Ajuste</h3>
  <div class="card">
    <div class="grid">
      <div><label>Brilho</label><input type="range" id="br" min="0" max="200" value="100" oninput="apply()"></div>
      <div><label>Contraste</label><input type="range" id="ct" min="0" max="200" value="100" oninput="apply()"></div>
      <div><label>Saturação</label><input type="range" id="st" min="0" max="200" value="100" oninput="apply()"></div>
      <div><label>Matiz (Hue)</label><input type="range" id="hu" min="0" max="360" value="0" oninput="apply()"></div>
      <div><label>Desfoque</label><input type="range" id="bl" min="0" max="10" value="0" oninput="apply()"></div>
      <div><label>Opacidade</label><input type="range" id="op" min="0" max="100" value="100" oninput="apply()"></div>
      <div><label>Cinza</label><input type="range" id="gr" min="0" max="100" value="0" oninput="apply()"></div>
      <div><label>Sépia</label><input type="range" id="se" min="0" max="100" value="0" oninput="apply()"></div>
    </div>
  </div>

  <h3>📐 Transformação e Efeitos</h3>
  <div class="card grid-3">
    <button onclick="changeZoom(0.1)">➕ Zoom</button>
    <button onclick="changeZoom(-0.1)">➖ Zoom</button>
    <button onclick="rotate(90)">🔄 Girar</button>
    <button onclick="flip()">↔️ Inverter</button>
    <button onclick="setEffect('none')">🚫 Limpar</button>
    <button onclick="setEffect('invert(100%)')">🌈 Inverter</button>
    <button onclick="setEffect('blur(5px) grayscale(1)')">🌫 Fantasma</button>
    <button onclick="setEffect('sepia(1) hue-rotate(180deg)')">🕰 Vintage</button>
    <button onclick="setEffect('brightness(2) contrast(1.5)')">🔥 HDR</button>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const subOverlay = document.getElementById('subtitle-overlay');
  let zoom = 1, rot = 0, flipX = 1;
  let customEffect = "";

  function openPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
  }

  function loadVid(input) {
    if (input.files[0]) {
      video.src = URL.createObjectURL(input.files[0]);
      video.play();
      openPage('preview', document.querySelector('.tab'));
    }
  }

  function apply() {
    const filters = [
      `brightness(${document.getElementById('br').value}%)`,
      `contrast(${document.getElementById('ct').value}%)`,
      `saturate(${document.getElementById('st').value}%)`,
      `hue-rotate(${document.getElementById('hu').value}deg)`,
      `blur(${document.getElementById('bl').value}px)`,
      `opacity(${document.getElementById('op').value}%)`,
      `grayscale(${document.getElementById('gr').value}%)`,
      `sepia(${document.getElementById('se').value}%)`,
      customEffect
    ].join(' ');

    video.style.filter = filters;
    video.style.transform = `rotate(${rot}deg) scale(${flipX * zoom}, ${zoom})`;
  }

  function changeZoom(v) { zoom += v; apply(); }
  function rotate(v) { rot += v; apply(); }
  function flip() { flipX *= -1; apply(); }
  function setEffect(eff) { customEffect = eff === 'none' ? "" : eff; apply(); }

  function updateSub() {
    subOverlay.innerText = document.getElementById('subIn').value;
    subOverlay.style.color = document.getElementById('subCol').value;
    subOverlay.style.fontSize = document.getElementById('subSize').value + 'px';
  }

  // FUNÇÃO MÁGICA: EXPORTAR VÍDEO
  async function exportVideo() {
    const status = document.getElementById('status');
    status.innerText = "⏳ Processando... Mantenha a aba aberta.";
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    const chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'video_editado_flash.webm';
      a.click();
      status.innerText = "✅ Download concluído!";
    };

    video.currentTime = 0;
    video.play();
    recorder.start();

    const drawFrame = () => {
      if (video.paused || video.ended) {
        recorder.stop();
        return;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      
      // Aplicar transformações no canvas
      ctx.translate(canvas.width/2, canvas.height/2);
      ctx.rotate(rot * Math.PI / 180);
      ctx.scale(flipX * zoom, zoom);
      ctx.filter = video.style.filter;
      ctx.drawImage(video, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
      
      // Desenhar Legenda no canvas
      ctx.restore();
      ctx.fillStyle = subOverlay.style.color;
      ctx.font = `${document.getElementById('subSize').value * (canvas.width/500)}px sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText(subOverlay.innerText, canvas.width/2, canvas.height * 0.9);
      
      requestAnimationFrame(drawFrame);
    };

    drawFrame();
    video.onended = () => recorder.stop();
  }
</script>
</body>
</html>
