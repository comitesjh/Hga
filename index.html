<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Flayky AI :33</title>
    <style>
        body { background: #ffe4e1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        #header { background: #ff69b4; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #messages { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 15px; max-width: 80%; font-size: 0.9em; }
        .user { align-self: flex-end; background: #e0e0e0; color: #333; }
        .flayky { align-self: flex-start; background: #ffc0cb; color: #d02090; }
        #input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px; outline: none; }
        button { background: #ff69b4; border: none; color: white; margin-left: 5px; border-radius: 50%; width: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Flayky :33 🌸</div>
    <div id="messages">
        <div class="msg flayky">Oii! Tipo, fala cmg! O q tá rolando? ✨</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Manda a letra...">
        <button onclick="sendMessage()">></button>
    </div>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('userInput');
        const msgDiv = document.getElementById('messages');
        
        if (input.value.trim() === "") return;

        // Mensagem do Usuário
        msgDiv.innerHTML += `<div class="msg user">${input.value}</div>`;
        
        // Lógica da Flayky (Exemplo de "Cérebro" simples)
        setTimeout(() => {
            const resposta = responder(input.value.toLowerCase());
            msgDiv.innerHTML += `<div class="msg flayky">${resposta}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }, 600);

        input.value = "";
    }

    function responder(texto) {
        if (texto.includes("oi") || texto.includes("olá")) return "Oii, td bom?? Mó vibe boa falar com vc! Sla kkkk :33";
        if (texto.includes("quem é você")) return "Eu sou a Flayky, sua nova bestie virtual! ✨💅";
        if (texto.includes("tudo bem")) return "Tô super, e vc? Espero q esteja tudo mara!";
        
        // Resposta padrão caso ela não entenda
        const aleatorias = [
            "Morta kkkkk sério??",
            "Gente, chocada. Mas eae, q mais?",
            "Sla, tipo, não entendi mto bem, mas conta mais!",
            "Tô nem acreditando nisso kkkk rlx!",
            "Aff, o auge viu? Mas conta, o q vc acha?"
        ];
        return aleatorias[Math.floor(Math.random() * aleatorias.length)];
    }
</script>

</body>
</html>
