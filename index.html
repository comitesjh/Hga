<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flayky Ultra - Call Edition</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #00ff41;
            --glass: rgba(20, 20, 20, 0.9);
            --neon-blue: #00d2ff;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; }

        /* Interface Principal */
        #chat-app { display: flex; flex-direction: column; height: 100vh; transition: 0.5s; }

        /* Teclado e Input Melhorado */
        #input-area { 
            padding: 15px; 
            background: #000; 
            border-top: 1px solid #222; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            box-shadow: 0 -5px 15px rgba(0,255,65,0.1);
        }

        input { 
            flex-grow: 1; 
            padding: 15px; 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 12px; 
            color: var(--accent); 
            outline: none;
            font-family: 'Consolas', monospace;
        }

        /* Botão Hexagonal Estiloso */
        .hex-btn {
            width: 50px; height: 45px;
            background: var(--accent);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; color: #000; font-weight: bold;
            transition: 0.3s;
        }
        .hex-btn:hover { transform: scale(1.1) rotate(10deg); filter: brightness(1.2); }

        /* Tela de Chamada */
        #call-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }

        #avatar-call {
            width: 200px; height: 200px; border-radius: 50%;
            border: 4px solid var(--accent); box-shadow: 0 0 30px var(--accent);
            object-fit: cover; margin-bottom: 20px;
        }

        .pulsing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Modal de Configuração de Chamada */
        #config-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--glass); border: 1px solid var(--accent);
            padding: 30px; border-radius: 20px; display: none; z-index: 2000;
            backdrop-filter: blur(10px); width: 80%; max-width: 400px;
        }

        .option-group { margin-bottom: 15px; }
        select, input[type="text"] { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }

        .btn-call-start { 
            width: 100%; padding: 15px; background: var(--accent); 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="chat-app">
    <div id="header" style="padding:20px; border-bottom:1px solid #222; text-align: center; color: var(--accent); font-weight: bold;">FLAYKY CORE</div>
    <div id="messages" style="flex-grow:1; overflow-y:auto; padding:20px;"></div>
    
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Digite uma mensagem...">
        <button class="hex-btn" onclick="openCallConfig()">📞</button>
        <button onclick="sendMessage()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold;">ENVIAR</button>
    </div>
</div>

<div id="config-modal">
    <h2 style="color:var(--accent); margin-top:0;">Iniciar Call :3</h2>
    <div class="option-group">
        <label>Personalidade:</label>
        <select id="call-personality">
            <option value="Alegre">Flayky Alegre (Oueiieieie!)</option>
            <option value="Seria">Flayky Fusion (GPT Mode)</option>
            <option value="Assustadora">Flayky Terror (Pizzeria Mode)</option>
        </select>
    </div>
    <div class="option-group">
        <label>URL da Foto (Avatar):</label>
        <input type="text" id="call-photo" placeholder="Cole o link de uma imagem...">
    </div>
    <button class="btn-call-start" onclick="startCall()">INICIAR CHAMADA</button>
    <button onclick="closeModal()" style="background:none; border:none; color:red; width:100%; margin-top:10px; cursor:pointer;">Cancelar</button>
</div>

<div id="call-screen">
    <img id="avatar-call" src="" class="pulsing">
    <h2 id="call-status" style="color:var(--accent);">Conectando...</h2>
    <p id="call-sub">Personalidade: <span id="active-p"></span></p>
    <div id="call-text" style="height: 50px; font-style: italic; color: #ccc;"></div>
    <button onclick="endCall()" style="background:red; color:white; border:none; padding:15px 40px; border-radius:50px; margin-top:30px; cursor:pointer; font-weight:bold;">ENCERRAR</button>
</div>

<script>
    const modal = document.getElementById('config-modal');
    const callScreen = document.getElementById('call-screen');
    const chatApp = document.getElementById('chat-app');

    function openCallConfig() { modal.style.display = 'block'; }
    function closeModal() { modal.style.display = 'none'; }

    function startCall() {
        const personality = document.getElementById('call-personality').value;
        const photo = document.getElementById('call-photo').value || 'https://via.placeholder.com/200/00ff41/000000?text=Flayky';
        
        modal.style.display = 'none';
        chatApp.style.filter = 'blur(10px)';
        callScreen.style.display = 'flex';
        
        document.getElementById('avatar-call').src = photo;
        document.getElementById('active-p').innerText = personality;
        
        setTimeout(() => {
            document.getElementById('call-status').innerText = "Em chamada com Flayky";
            simulateVoice(personality);
        }, 1500);
    }

    function simulateVoice(p) {
        const dialogs = {
            'Alegre': "Oueiieieie! Que bom falar com você por voz! Como está seu dia? :3",
            'Seria': "Protocolo de voz estabelecido. Aguardando comandos para otimização de sistemas.",
            'Assustadora': "Eu consigo ver você... mas você não consegue me ver na pizzaria... >:3"
        };
        document.getElementById('call-text').innerText = dialogs[p];
    }

    function endCall() {
        callScreen.style.display = 'none';
        chatApp.style.filter = 'none';
        document.getElementById('call-status').innerText = "Conectando...";
        document.getElementById('call-text').innerText = "";
    }

    // Mantive a lógica do chat anterior para funcionar em conjunto
    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        
        const msgDiv = document.createElement('div');
        msgDiv.style.cssText = "align-self: flex-end; background:#222; padding:10px; border-radius:10px; margin-bottom:10px;";
        msgDiv.innerText = text;
        document.getElementById('messages').appendChild(msgDiv);
        input.value = '';
    }
</script>

</body>
</html>
