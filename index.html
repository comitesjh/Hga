<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Editor Studio</title>
  <style>
    :root { --p: #ff0055; --s: #00f2ff; --bg: #0d0d0f; }
    body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
    
    /* TELA 1: Preview (Fixa) */
    .preview-screen {
      position: sticky; top: 0; background: #000; padding: 10px; z-index: 1000;
      border-bottom: 2px solid var(--p); box-shadow: 0 5px 20px rgba(0,0,0,0.8);
    }
    .video-wrapper { position: relative; max-width: 500px; margin: 0 auto; line-height: 0; }
    #v { width: 100%; border-radius: 8px; }
    #subtitle-overlay {
      position: absolute; bottom: 15%; left: 0; width: 100%; text-align: center;
      font-weight: bold; color: yellow; text-shadow: 2px 2px 4px black; pointer-events: none; font-size: 1.2rem;
    }

    /* TELA 2: Edição (Scroll) */
    .editor-screen { padding: 20px; max-width: 600px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #222; color: white; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    .btn-save { background: var(--p); grid-column: span 2; font-size: 16px; margin-top: 10px; }
    
    input[type="range"] { width: 100%; accent-color: var(--p); }
    input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--s); background: #111; color: white; box-sizing: border-box; }
    
    label { font-size: 12px; color: var(--s); display: block; margin-bottom: 5px; }
    h3 { font-size: 14px; border-left: 3px solid var(--p); padding-left: 10px; margin: 20px 0 10px; }
  </style>
</head>
<body>

<div class="preview-screen">
  <div class="video-wrapper">
    <video id="v" crossorigin="anonymous"></video>
    <div id="subtitle-overlay"></div>
  </div>
  <div style="text-align: center; margin-top: 10px;">
    <progress id="exportProgress" value="0" max="100" style="width: 100%; display:none;"></progress>
    <small id="statusText" style="color:var(--s)"></small>
  </div>
</div>

<div class="editor-screen">
  <button class="btn-save" onclick="exportVideo()">💾 BAIXAR VÍDEO EDITADO</button>

  <h3>Arquivos</h3>
  <div class="card grid">
    <button onclick="document.getElementById('vIn').click()">🎥 Vídeo</button>
    <button onclick="document.getElementById('aIn').click()">🎵 Áudio</button>
    <input type="file" id="vIn" accept="video/*" hidden onchange="loadVid(this)">
    <input type="file" id="aIn" accept="audio/*" hidden onchange="addAud(this)">
  </div>

  <h3>Legendas Dynamicas</h3>
  <div class="card">
    <label>Texto da Legenda</label>
    <input type="text" id="subText" placeholder="Digite aqui..." oninput="updateSub()">
  </div>

  <h3>Filtros e Efeitos</h3>
  <div class="card">
    <div class="grid">
      <button onclick="rotateVid()">🔄 Girar</button>
      <button onclick="flipVid()">↔️ Mirror</button>
    </div>
    <br>
    <label>Brilho</label>
    <input type="range" id="br" min="0" max="200" value="100" oninput="apply()">
    <label>Zoom</label>
    <input type="range" id="zm" min="1" max="2" step="0.1" value="1" oninput="apply()">
  </div>

  <h3>Mixagem de Som</h3>
  <div class="card">
    <label>Volume do Vídeo</label>
    <input type="range" id="vv" min="0" max="1" step="0.1" value="1" oninput="apply()">
    <div id="tracks"></div>
  </div>
</div>

<canvas id="exportCanvas" style="display:none;"></canvas>

<script>
  const v = document.getElementById('v');
  const subOverlay = document.getElementById('subtitle-overlay');
  let rotation = 0, flip = 1;

  function apply() {
    const br = document.getElementById('br').value;
    const zm = document.getElementById('zm').value;
    v.style.filter = `brightness(${br}%)`;
    v.style.transform = `rotate(${rotation}deg) scale(${flip * zm}, ${zm})`;
    v.volume = document.getElementById('vv').value;
    saveState();
  }

  function loadVid(input) {
    if (input.files[0]) {
      v.src = URL.createObjectURL(input.files[0]);
      v.play();
      apply();
    }
  }

  function updateSub() {
    subOverlay.innerText = document.getElementById('subText').value;
    saveState();
  }

  function rotateVid() { rotation = (rotation + 90) % 360; apply(); }
  function flipVid() { flip *= -1; apply(); }

  function addAud(input) {
    const file = input.files[0];
    const url = URL.createObjectURL(file);
    const id = 'aud' + Date.now();
    const div = document.createElement('div');
    div.innerHTML = `<label>🎵 ${file.name.substring(0,10)}</label>
      <audio id="${id}" src="${url}"></audio>
      <input type="range" min="0" max="1" step="0.1" oninput="document.getElementById('${id}').volume=this.value">`;
    document.getElementById('tracks').appendChild(div);
  }

  // Sincronização
  v.onplay = () => document.querySelectorAll('audio').forEach(a => a.play());
  v.onpause = () => document.querySelectorAll('audio').forEach(a => a.pause());
  v.onseeking = () => document.querySelectorAll('audio').forEach(a => a.currentTime = v.currentTime);

  // FUNÇÃO MÁGICA: EXPORTAR VÍDEO
  async function exportVideo() {
    const canvas = document.getElementById('exportCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('statusText');
    
    canvas.width = v.videoWidth;
    canvas.height = v.videoHeight;
    
    const stream = canvas.captureStream(30);
    // Adiciona o áudio do vídeo original ao stream de exportação
    const audioContext = new AudioContext();
    const dest = audioContext.createMediaStreamDestination();
    const source = audioContext.createMediaElementSource(v);
    source.connect(dest);
    source.connect(audioContext.destination);
    
    const combinedStream = new MediaStream([
      ...stream.getVideoTracks(),
      ...dest.stream.getAudioTracks()
    ]);

    const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
    const chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'video_editado.webm';
      a.click();
      status.innerText = "✅ Download Concluído!";
    };

    v.currentTime = 0;
    v.play();
    recorder.start();
    status.innerText = "🚀 Renderizando... aguarde o vídeo acabar.";

    const drawFrame = () => {
      if (v.paused || v.ended) {
        recorder.stop();
        return;
      }
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      
      // Aplica as edições no Canvas (Filtros e Transformação)
      ctx.translate(canvas.width/2, canvas.height/2);
      ctx.rotate(rotation * Math.PI / 180);
      ctx.scale(flip * document.getElementById('zm').value, document.getElementById('zm').value);
      ctx.filter = `brightness(${document.getElementById('br').value}%)`;
      ctx.drawImage(v, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
      ctx.restore();

      // Desenha Legenda
      ctx.fillStyle = "yellow";
      ctx.font = "bold 40px Arial";
      ctx.textAlign = "center";
      ctx.shadowColor = "black";
      ctx.shadowBlur = 7;
      ctx.fillText(document.getElementById('subText').value, canvas.width/2, canvas.height * 0.85);
      
      requestAnimationFrame(drawFrame);
    };

    drawFrame();
  }

  function saveState() {
    const state = { br: document.getElementById('br').value, sub: document.getElementById('subText').value, time: v.currentTime };
    localStorage.setItem('flashEditorStore', JSON.stringify(state));
  }

  window.onload = () => {
    const s = JSON.parse(localStorage.getItem('flashEditorStore'));
    if(s) {
      document.getElementById('subText').value = s.sub || "";
      updateSub();
    }
  };
</script>
</body>
      </html>
