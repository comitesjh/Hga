<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flayky Ultra - Call Edition</title>
    <style>
        :root {
            --bg: #000000;
            --core-green: #00ff00;
            --dark-grey: #121212;
            --user-blue: #007aff;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        /* Header inspirado na sua print */
        #header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
            background: var(--bg);
        }
        #header h1 {
            color: var(--core-green);
            font-size: 16px;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        /* Chat Area */
        #chat-flow {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
        }
        .bot-msg { background: var(--dark-grey); align-self: flex-start; border: 1px solid #333; color: #eee; }
        .user-msg { background: var(--user-blue); align-self: flex-end; color: white; }

        /* Teclado Mobile Melhorado */
        #input-container {
            padding: 15px;
            background: #080808;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #1a1a1a;
        }
        input {
            flex-grow: 1;
            background: #1a1a1a;
            border: none;
            padding: 15px 20px;
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 16px;
        }
        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-call { background: var(--core-green); color: black; font-size: 20px; }
        .btn-send { background: #333; color: var(--core-green); }

        /* Menu de Personalidade e Call */
        #call-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .personality-opt {
            background: var(--dark-grey);
            padding: 20px;
            margin: 10px;
            border-radius: 15px;
            width: 80%;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #222;
        }
        .personality-opt img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }

        /* Tela de Ligação Ativa */
        #active-call-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .big-avatar {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 4px solid var(--core-green);
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.3);
            margin-bottom: 30px;
        }
        .hang-up {
            background: #ff3b30;
            width: 70px; height: 70px;
            border-radius: 50%;
            margin-top: 60px;
            border: none; color: white; font-size: 24px;
        }
    </style>
</head>
<body>

<div id="header">
    <h1>FLAYKY CORE</h1>
</div>

<div id="chat-flow">
    <div class="bubble bot-msg">Sistema Flayky Ultra carregado. Aguardando comandos...</div>
</div>

<div id="input-container">
    <button class="action-btn btn-call" onclick="toggleMenu()">📞</button>
    <input type="text" id="userInput" placeholder="Digite aqui...">
    <button class="action-btn btn-send" onclick="handleSend()">🚀</button>
</div>

<div id="call-ui">
    <div id="selection-menu">
        <h2 style="color: var(--core-green); margin-bottom: 30px;">Escolha a Versão</h2>
        
        <div class="personality-opt" onclick="startCall('Flayky Gamer', 'https://i.imgur.com/w2nZXvP.png')">
            <img src="https://i.imgur.com/w2nZXvP.png">
            <span>Flayky Gamer (Godot/FNAF)</span>
        </div>

        <div class="personality-opt" onclick="startCall('Flayky Fusion', 'https://i.imgur.com/bX78shm.png')">
            <img src="https://i.imgur.com/bX78shm.png">
            <span>Flayky Fusion (ChatGPT Mode)</span>
        </div>

        <div class="personality-opt" onclick="startCall('Flayky Terror', 'https://i.imgur.com/6o8mB9X.png')">
            <img src="https://i.imgur.com/6o8mB9X.png">
            <span>Flayky Dark (Horror Mode)</span>
        </div>

        <button onclick="toggleMenu()" style="margin-top: 30px; background: none; border: 1px solid white; color: white; padding: 10px 30px; border-radius: 20px;">Cancelar</button>
    </div>

    <div id="active-call-screen">
        <img id="current-photo" class="big-avatar" src="">
        <h2 id="current-name" style="margin: 10px 0;">Nome</h2>
        <div style="color: var(--core-green); font-family: monospace;">Chamada em curso...</div>
        <button class="hang-up" onclick="endCall()">✖</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat-flow');
    const input = document.getElementById('userInput');

    function toggleMenu() {
        const ui = document.getElementById('call-ui');
        ui.style.display = ui.style.display === 'flex' ? 'none' : 'flex';
        document.getElementById('selection-menu').style.display = 'block';
        document.getElementById('active-call-screen').style.display = 'none';
    }

    function startCall(name, photo) {
        document.getElementById('selection-menu').style.display = 'none';
        document.getElementById('active-call-screen').style.display = 'flex';
        document.getElementById('current-photo').src = photo;
        document.getElementById('current-name').innerText = name;
    }

    function endCall() {
        toggleMenu();
    }

    function handleSend() {
        const text = input.value.trim();
        if(!text) return;

        addMsg('user-msg', text);
        input.value = '';

        setTimeout(() => {
            let reply = "Processando dados no núcleo Flayky...";
            if(text.toLowerCase().includes('oi')) reply = "Oueieieie! Pronto para mais uma sessão de desenvolvimento? :3";
            addMsg('bot-msg', reply);
        }, 800);
    }

    function addMsg(type, text) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
