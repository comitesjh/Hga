<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Poppy Playtime Cap 6 - Intro Interface</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Efeito de Scanline (TV Antiga) */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        #game-container {
            position: relative;
            width: 80%;
            height: 80%;
            border: 2px solid #333;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 0 50px #ff000033;
        }

        /* HUD do GrabPack */
        .hud-status {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 12px;
            text-align: left;
            opacity: 0.7;
        }

        #subtitles {
            position: absolute;
            bottom: 10%;
            width: 80%;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            min-height: 3em;
        }

        .doctor-glitch {
            font-size: 4rem;
            font-weight: bold;
            color: #555;
            animation: glitch 0.2s infinite;
            display: none;
        }

        @keyframes glitch {
            0% { transform: translate(2px, 0); opacity: 0.8; }
            50% { transform: translate(-2px, -2px); opacity: 1; color: #fff; }
            100% { transform: translate(1px, 2px); opacity: 0.7; }
        }

        button {
            background: none;
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }

        button:hover {
            background: #ff0000;
            color: #000;
        }
    </style>
</head>
<body>

<div class="crt-overlay"></div>

<div id="game-container">
    <div class="hud-status">
        GRABPACK v4.02<br>
        SISTEMA: <span id="sys-status">CRÍTICO</span><br>
        CONEXÃO: ESTÁVEL (GIBLET-LINK)
    </div>

    <div id="visual-area">
        <button id="start-btn">INICIAR SEQUÊNCIA: CAPÍTULO 6</button>
        <div id="doctor-face" class="doctor-glitch">DR. SAWYER</div>
    </div>

    <div id="subtitles"></div>
</div>

<script>
    const subs = document.getElementById('subtitles');
    const btn = document.getElementById('start-btn');
    const face = document.getElementById('doctor-face');
    const status = document.getElementById('sys-status');

    const scriptLines = [
        { text: "[Chiado de estática intensa...]", delay: 1000 },
        { text: "Você é persistente... Eu admito.", delay: 2500 },
        { text: "O 1006 achou que você era apenas lixo descartável.", delay: 3000 },
        { text: "Mas ele esqueceu que o lixo é o que restou deste império.", delay: 3000 },
        { text: "Eu não sou mais um funcionário... Eu sou o SISTEMA.", delay: 3500 },
        { text: "Prepare-se. Vamos descer agora.", delay: 2000 }
    ];

    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        startSequence();
    });

    async function startSequence() {
        // Simula o sistema voltando
        status.innerText = "RESTAURANDO...";
        status.style.color = "#00ff00";
        
        for (let line of scriptLines) {
            if (line.text.includes("SISTEMA")) {
                face.style.display = 'block';
                document.body.style.backgroundColor = "#111";
            }
            
            subs.innerText = line.text;
            await new Promise(r => setTimeout(r, line.delay));
            subs.innerText = "";
            await new Promise(r => setTimeout(r, 200));
        }

        // Final da intro
        document.getElementById('game-container').innerHTML = "<h1 style='color:white'>CAPÍTULO 6: O SISTEMA QUE TUDO VÊ</h1>";
    }
</script>

</body>
</html>
