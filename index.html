<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Editor Mobile</title>
  <style>
    body { font-family: sans-serif; background: #111; color: white; margin: 0; padding: 10px; }
    .canvas-area { position: sticky; top: 0; background: #111; padding-bottom: 10px; z-index: 100; }
    video { width: 100%; border-radius: 10px; border: 2px solid #ff0055; }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
    .btn-file { background: #333; color: white; }
    .btn-rec { background: #ff0055; color: white; }
    .track { background: #222; padding: 10px; margin-top: 5px; border-radius: 5px; font-size: 12px; }
    input[type="range"] { width: 100%; accent-color: #ff0055; }
    .scroll-area { margin-top: 20px; }
  </style>
</head>
<body>

<div class="canvas-area">
  <video id="video" controls></video>
</div>

<div class="scroll-area">
  <div class="controls">
    <button class="btn-file" onclick="document.getElementById('vIn').click()">🎥 Vídeo</button>
    <button class="btn-file" onclick="document.getElementById('aIn').click()">🎵 Áudio/MP3</button>
    <button class="btn-file" onclick="document.getElementById('v2aIn').click()">🔊 Som de Vídeo</button>
    <button id="recBtn" class="btn-rec" onclick="toggleRec()">🎤 Gravar Voz</button>
  </div>

  <input type="file" id="vIn" accept="video/*" hidden onchange="loadVid(this)">
  <input type="file" id="aIn" accept="audio/*" hidden onchange="addAud(this)">
  <input type="file" id="v2aIn" accept="video/*" hidden onchange="addAud(this)">

  <h3>Filtros de Imagem</h3>
  <div class="controls">
    <div><label>Brilho</label><input type="range" id="br" min="0" max="200" value="100" oninput="apply()"></div>
    <div><label>Saturação</label><input type="range" id="st" min="0" max="200" value="100" oninput="apply()"></div>
    <div><label>Cinza</label><input type="range" id="gr" min="0" max="100" value="0" oninput="apply()"></div>
    <div><label>Velocidade</label><input type="range" id="sp" min="0.5" max="2" step="0.1" value="1" oninput="apply()"></div>
  </div>

  <h3>Trilhas de Áudio</h3>
  <div id="tracks"></div>
</div>

<script>
  const video = document.getElementById('video');
  let mediaRec;
  let chunks = [];

  function apply() {
    const br = document.getElementById('br').value;
    const st = document.getElementById('st').value;
    const gr = document.getElementById('gr').value;
    const sp = document.getElementById('sp').value;
    
    video.style.filter = `brightness(${br}%) saturate(${st}%) grayscale(${gr}%)`;
    video.playbackRate = sp;
    saveState();
  }

  function loadVid(input) {
    video.src = URL.createObjectURL(input.files[0]);
    apply();
  }

  function addAud(input) {
    const file = input.files[0];
    const url = URL.createObjectURL(file);
    const id = 'aud' + Date.now();
    const div = document.createElement('div');
    div.className = 'track';
    div.innerHTML = `
      <span>${file.name.substring(0,15)}...</span>
      <audio id="${id}" src="${url}"></audio>
      <input type="range" min="0" max="1" step="0.1" oninput="document.getElementById('${id}').volume=this.value">
    `;
    document.getElementById('tracks').appendChild(div);
  }

  async function toggleRec() {
    const btn = document.getElementById('recBtn');
    if (!mediaRec || mediaRec.state === 'inactive') {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRec = new MediaRecorder(stream);
      chunks = [];
      mediaRec.ondataavailable = e => chunks.push(e.data);
      mediaRec.onstop = () => {
        const blob = new Blob(chunks, { type: 'audio/ogg' });
        addAud({ files: [new File([blob], "Gravacao.ogg")] });
      };
      mediaRec.start();
      btn.innerText = "🛑 Parar";
      btn.style.background = "orange";
    } else {
      mediaRec.stop();
      btn.innerText = "🎤 Gravar Voz";
      btn.style.background = "#ff0055";
    }
  }

  // Sincronização
  video.onplay = () => document.querySelectorAll('audio').forEach(a => a.play());
  video.onpause = () => document.querySelectorAll('audio').forEach(a => a.pause());
  video.onseeking = () => document.querySelectorAll('audio').forEach(a => a.currentTime = video.currentTime);

  function saveState() {
    const state = {
        br: document.getElementById('br').value,
        st: document.getElementById('st').value,
        gr: document.getElementById('gr').value,
        sp: document.getElementById('sp').value,
        time: video.currentTime
    };
    localStorage.setItem('mobileEditor', JSON.stringify(state));
  }

  window.onload = () => {
    const s = JSON.parse(localStorage.getItem('mobileEditor'));
    if(s) {
        document.getElementById('br').value = s.br;
        document.getElementById('st').value = s.st;
        document.getElementById('gr').value = s.gr;
        document.getElementById('sp').value = s.sp;
        video.currentTime = s.time;
        apply();
    }
  };
</script>
</body>
</html>
